<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1 class="title">МАЛЮСКА ПИРСИНГ</h1>
        
        <div class="form-group">
            <label>Твой возраст:</label>
            <div class="age-selector">
                <button type="button" class="age-btn" id="age-18" onclick="setAge(18)">МНЕ ЕСТЬ 18</button>
                <button type="button" class="age-btn" id="age-under" onclick="setAge(17)">МНЕ НЕТ 18</button>
            </div>
            <p id="age-warning" class="warning" style="display: none;">Нужно присутствие родителей или записка!</p>
        </div>

        <div class="form-group">
            <label>Что колем?</label>
            <select id="service_type" onchange="checkAnatomy()">
                <option value="ear_lobe">Мочка уха</option>
                <option value="helix">Хеликс</option>
                <option value="industrial">Индастриал (важна анатомия!)</option>
                <option value="septum">Септум</option>
                <option value="nostril">Нострил</option>
                <option value="navel">Пупок (важна анатомия!)</option>
            </select>
        </div>

        <div id="anatomy-info" class="info-box" style="display: none;">
            ⚠️ Для этого прокола важна анатомия. Мастер может отказать или предложить другой вариант на сеансе.
        </div>

        <div class="form-group">
            <label>Кол-во проколов (макс. 3):</label>
            <input type="number" id="count" min="1" max="3" value="1">
        </div>

        <div class="form-group">
            <label>Дата и время:</label>
            <input type="date" id="order_date">
            <input type="time" id="order_time">
        </div>

        <button class="main-btn" id="submit_btn">ЗАБРОНИРОВАТЬ (300₽)</button>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
    let tg = window.Telegram.WebApp;
    let selectedAge = "";

    tg.expand(); // Развернуть окно на весь экран

    function setAge(age) {
        selectedAge = age >= 18 ? "18+" : "до 18";
        // Подсветка кнопок
        document.getElementById('age-18').classList.remove('active');
        document.getElementById('age-under').classList.remove('active');
        
        if (age >= 18) {
            document.getElementById('age-18').classList.add('active');
            document.getElementById('age-warning').style.display = 'none';
        } else {
            document.getElementById('age-under').classList.add('active');
            document.getElementById('age-warning').style.display = 'block';
        }
    }

    function sendData() {
        const data = {
            service: document.getElementById('service').value,
            quantity: document.getElementById('quantity').value,
            date: document.getElementById('date').value,
            time: document.getElementById('time').value,
            age: selectedAge
        };

        if (!selectedAge || !data.date || !data.time) {
            alert("Заполни все поля, бро");
            return;
        }

        tg.sendData(JSON.stringify(data));
    }
</script>
</body>
</html>
