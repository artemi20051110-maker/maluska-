<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css?v=fresh_start">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1 class="title">МАЛЮСКА<br>ПИРСИНГ</h1>
        
        <div class="form-group">
            <label>твой возраст:</label>
            <div class="age-selector">
                <button type="button" class="age-btn" id="age-18" onclick="setAge(18)">18+</button>
                <button type="button" class="age-btn" id="age-under" onclick="setAge(17)">до 18</button>
            </div>
            <p id="age-warning" class="warning" style="display: none;">нужно присутствие родителей или записка!</p>
        </div>

        <div class="form-group">
            <label>что колем?</label>
            <select id="service_type">
                <option value="мочка уха">мочка уха</option>
                <option value="хеликс">хеликс</option>
                <option value="индастриал">индастриал</option>
                <option value="септум">септум</option>
                <option value="нострил">нострил</option>
                <option value="пупок">пупок</option>
            </select>
        </div>

        <div class="form-group">
            <label>кол-во проколов (макс. 3):</label>
            <input type="number" id="count" min="1" max="3" value="1">
        </div>

        <div class="form-group">
            <label>дата и время:</label>
            <div class="datetime-row">
                <input type="date" id="order_date">
                <input type="time" id="order_time">
            </div>
        </div>

        <button class="main-button" id="submit_btn" onclick="sendData()">забронировать (300₽)</button>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        let selectedAge = "";

        tg.expand(); // Разворачиваем на весь экран

        function setAge(age) {
            selectedAge = age >= 18 ? "18+" : "до 18";
            document.getElementById('age-18').classList.remove('active');
            document.getElementById('age-under').classList.remove('active');
            
            if (age >= 18) {
                document.getElementById('age-18').classList.add('active');
                document.getElementById('age-warning').style.display = 'none';
            } else {
                document.getElementById('age-under').classList.add('active');
                document.getElementById('age-warning').style.display = 'block';
            }
        }

        function sendData() {
            const data = {
                service: document.getElementById('service_type').value,
                quantity: document.getElementById('count').value,
                date: document.getElementById('order_date').value,
                time: document.getElementById('order_time').value,
                age: selectedAge
            };

            if (!selectedAge || !data.date || !data.time) {
                tg.showAlert("заполни все поля, бро!");
                return;
            }

            tg.sendData(JSON.stringify(data)); // Вот теперь данные улетят в бота
        }
    </script>
</body>
</html>
