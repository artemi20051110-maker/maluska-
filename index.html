<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1 class="title">МАЛЮСКА ПИРСИНГ</h1>
        
        <div class="form-group">
            <label>Твой возраст:</label>
            <div class="age-selector">
                <button type="button" class="age-btn" id="age-18" onclick="setAge(18)">МНЕ ЕСТЬ 18</button>
                <button type="button" class="age-btn" id="age-under" onclick="setAge(17)">МНЕ НЕТ 18</button>
            </div>
            <p id="age-warning" class="warning" style="display: none;">Нужно присутствие родителей или записка!</p>
        </div>

        <div class="form-group">
            <label>Что колем?</label>
            <select id="service_type" onchange="checkAnatomy()">
                <option value="ear_lobe">Мочка уха</option>
                <option value="helix">Хеликс</option>
                <option value="industrial">Индастриал (важна анатомия!)</option>
                <option value="septum">Септум</option>
                <option value="nostril">Нострил</option>
                <option value="navel">Пупок (важна анатомия!)</option>
            </select>
        </div>

        <div id="anatomy-info" class="info-box" style="display: none;">
            ⚠️ Для этого прокола важна анатомия. Мастер может отказать или предложить другой вариант на сеансе.
        </div>

        <div class="form-group">
            <label>Кол-во проколов (макс. 3):</label>
            <input type="number" id="count" min="1" max="3" value="1">
        </div>

        <div class="form-group">
            <label>Дата и время:</label>
            <input type="date" id="order_date">
            <input type="time" id="order_time">
        </div>

        <button class="main-btn" id="submit_btn">ЗАБРОНИРОВАТЬ (300₽)</button>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        let tg = window.Telegram.WebApp;
        let selectedAge = null;

        function setAge(age) {
            selectedAge = age;
            document.querySelectorAll('.age-btn').forEach(b => b.classList.remove('active'));
            if(age === 18) document.getElementById('age-18').classList.add('active');
            else document.getElementById('age-under').classList.add('active');
            document.getElementById('age-warning').style.display = age < 18 ? 'block' : 'none';
        }

        function checkAnatomy() {
            const val = document.getElementById('service_type').value;
            const warning = document.getElementById('anatomy-info');
            warning.style.display = (val === 'industrial' || val === 'navel') ? 'block' : 'none';
        }

        document.getElementById('submit_btn').onclick = function() {
            if(!selectedAge) return alert('Выбери возраст!');
            
            let data = {
                age: selectedAge,
                service: document.getElementById('service_type').value,
                count: document.getElementById('count').value,
                date: document.getElementById('order_date').value,
                time: document.getElementById('order_time').value
            };
            tg.sendData(JSON.stringify(data));
            tg.close();
        };
    </script>
</body>
</html>
